name: CI

on:
  push:
  pull_request:
      branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        cc: [clang, gcc]
        kernel: [ish, linux]
    steps:
      - uses: actions/checkout@v6
        with:
            submodules: true
      - uses: actions/setup-python@v6
        with:
            python-version: '3.x'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libarchive-dev
          pip3 install meson ninja
      - name: Clone Linux
        if: matrix.kernel == 'linux'
        run: deps/clone-linux.sh
      - name: Build
        run: |
          meson build -Dengine=asbestos -Dkernel=${{matrix.kernel}}
          ninja -C build
        env:
          CC: ${{matrix.cc}}
      - name: Test
        if: matrix.kernel == 'ish'
        run: ninja -C build test

  build-mac:
    runs-on: macos-latest   # 记得把 macos-26 改掉！
    strategy:
      matrix:
        kernel: [ish, linux]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          brew install llvm lld ninja libarchive meson

      - name: Clean build cache
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
      
      - name: Bump deployment target to 12.0
        run: |
          find . -name project.pbxproj -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 11\.0/IPHONEOS_DEPLOYMENT_TARGET = 12.0/g' {} +
     
      - name: Clone Linux
        if: matrix.kernel == 'linux'
        run: deps/clone-linux.sh

      # ★ 关键修复步骤 ★
      - name: Fix missing generic_mkdirat for simulator
        if: matrix.kernel == 'linux'
        run: |
          cat > /tmp/generic_mkdirat.c << 'EOF'
          #include <sys/stat.h>
          #include <unistd.h>
          int generic_mkdirat(int dirfd, const char *pathname, mode_t mode) {
              return mkdirat(dirfd, pathname, mode);
          }
          EOF
          # 获取模拟器 SDK 路径和最低部署目标
          SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)
          TARGET="arm64-apple-ios12.0-simulator"   # 目标改成 12.0，消除警告
          clang -c -target $TARGET -isysroot $SDK_PATH /tmp/generic_mkdirat.c -o /tmp/generic_mkdirat.o

      - name: Build (ish kernel)
        if: matrix.kernel == 'ish'
        run: xcodebuild -project iSH.xcodeproj -scheme iSH -arch arm64 -sdk iphoneos CODE_SIGNING_ALLOWED=NO

      - name: Package unsigned .ipa
        if: matrix.kernel == 'ish'
        run: |
          # 用 xcodebuild -showBuildSettings 获取 BUILT_PRODUCTS_DIR
          eval $(xcodebuild -project iSH.xcodeproj -scheme iSH -sdk iphoneos \
            -showBuildSettings | grep -E '^\s*BUILT_PRODUCTS_DIR|^\s*FULL_PRODUCT_NAME' | \
            sed 's/^[[:space:]]*//' | sed 's/ = /=/' | tr -d '\r')
          APP_PATH="$BUILT_PRODUCTS_DIR/$FULL_PRODUCT_NAME"
          echo "App is at $APP_PATH"
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          zip -r iSH-unsigned.ipa Payload
          rm -rf Payload
          
      - name: Upload IPA
        if: matrix.kernel == 'ish'
        uses: actions/upload-artifact@v4
        with:
          name: iSH-unsigned-ipaj
          path: iSH-unsigned.ipa

      - name: Fix missing generic_mkdirat for device
        if: matrix.kernel == 'linux'
        run: |
          cat > /tmp/generic_mkdirat.c << 'EOF'
          #include <sys/stat.h>
          #include <unistd.h>
          int generic_mkdirat(int dirfd, const char *pathname, mode_t mode) {
              return mkdirat(dirfd, pathname, mode);
          }
          EOF
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          TARGET="arm64-apple-ios12.0"    # 注意：没有 -simulator
          clang -c -target $TARGET -isysroot $SDK_PATH /tmp/generic_mkdirat.c -o /tmp/generic_mkdirat_device.o

# 替换原来的 Build (linux kernel) 步骤
      - name: Fix missing generic_mkdirat (device)
        if: matrix.kernel == 'linux'
        run: |
          cat > /tmp/generic_mkdirat.c << 'EOF'
          #include <sys/stat.h>
          #include <unistd.h>
          int generic_mkdirat(int dirfd, const char *pathname, mode_t mode) {
              return mkdirat(dirfd, pathname, mode);
          }
          EOF
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -c -target arm64-apple-ios12.0 -isysroot $SDK_PATH \
            /tmp/generic_mkdirat.c -o /tmp/generic_mkdirat_device.o

      - name: Build (linux kernel) for device
        if: matrix.kernel == 'linux'
        run: |
          xcodebuild -project iSH.xcodeproj -scheme iSH+Linux \
            -arch arm64 -sdk iphoneos \
            -configuration DebugLinux \
            CODE_SIGNING_ALLOWED=NO \
            OTHER_LDFLAGS="/tmp/generic_mkdirat_device.o"

      - name: Package unsigned .ipa (linux)
        if: matrix.kernel == 'linux'
        run: |
          eval $(xcodebuild -project iSH.xcodeproj -scheme iSH+Linux -sdk iphoneos \
            -configuration DebugLinux -showBuildSettings | \
            grep -E '^\s*BUILT_PRODUCTS_DIR|^\s*FULL_PRODUCT_NAME' | \
            sed 's/^[[:space:]]*//' | sed 's/ = /=/' | tr -d '\r')
          APP_PATH="$BUILT_PRODUCTS_DIR/$FULL_PRODUCT_NAME"
          echo "App is at $APP_PATH"
          # 确认文件存在
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: App bundle not found!"
            exit 1
          fi
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          zip -r iSH-Linux-unsigned.ipa Payload

      - name: Upload IPA
        if: matrix.kernel == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: iSH-Linux-unsigned.ipa
          path: iSH-Linux-unsigned.ipa
